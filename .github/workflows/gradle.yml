name: Gradle Publish

on:
  push:
    branches: ['main']

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - uses: actions/checkout@v4
      # Java 21
      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      # Setup Gradle
      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
      # Build
      - name: Publish
        run: ./gradlew clean publish --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
          REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}
      # Expose Release & Tag
      - name: Expose Release & Tag
        run: |
          echo "PROJECT_RELEASE=$(./gradlew getRelease --quiet --no-rebuild --no-daemon)" >> $GITHUB_ENV
          echo "PROJECT_TAG=$(./gradlew getTag --quiet --no-rebuild --no-daemon)" >> $GITHUB_ENV
      # Release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # Configuring release name and tag.
          name: ${{ env.PROJECT_RELEASE }}
          tag_name: ${{ env.PROJECT_TAG }}